quests:
  - id: restore_harvest_feast
    type: main
    autoStart: true
    title: Restore the Harvest Feast
    summary: Help the townsfolk prepare for the Harvest.
    completionSummary: The Harvest Feast was restored.
    objectives:
      - id: find_bayker
        text: Find Bayker at the bakery.
        location: Old Bakery
        giver: Inspekta
        initiallyActive: true

      - id: gather_wildflowers
        text: Gather wildflowers.
        location: Milldread Woods
        giver: Bayker
        progressTarget: 10
        initiallyActive: false

      - id: return_to_bayker
        text: Return to Bayker.
        location: Old Bakery
        giver: Bayker
        initiallyActive: false
  - id: missing_mill_key
    type: side
    autoStart: false
    title: The Missing Mill Key
    summary: Find the key needed to open the abandoned mill.
    completionSummary: The mill key was returned and the mill can be opened again.
    objectives:
      - id: search_the_mill_yard
        text: Search the mill yard for the missing key.
        location: Abandoned Mill
        giver: Mill Keeper
        initiallyActive: true

      - id: return_the_mill_key
        text: Return the mill key to the Mill Keeper.
        location: Mill House
        giver: Mill Keeper
        initiallyActive: false

